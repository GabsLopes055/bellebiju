<div class="dialog-wrap">

  <!-- Header -->
  <div class="dialog-header danger">
    <div class="dialog-title-row">
      <div class="dialog-icon-wrap red">
        <span class="material-icons">delete_forever</span>
      </div>
      <div>
        <h2 class="dialog-title">Excluir Venda</h2>
        <p class="dialog-sub">Esta ação não pode ser desfeita</p>
      </div>
    </div>
    <button class="dialog-close" mat-dialog-close title="Fechar">
      <span class="material-icons">close</span>
    </button>
  </div>

  <!-- Body -->
  <div class="dialog-body">
    <div class="confirm-box">
      <span class="material-icons confirm-icon">warning_amber</span>
      <p class="confirm-text">
        Tem certeza que deseja excluir a venda de
        <strong>{{ venda.nomeProduto }}</strong>?
      </p>
    </div>
  </div>

  <!-- Footer -->
  <div class="dialog-footer">
    <button class="btn-ghost" mat-dialog-close [disabled]="isLoading">Cancelar</button>
    <button class="btn-danger" (click)="confirmarExclusao()" [disabled]="isLoading">
      <span class="btn-spinner" *ngIf="isLoading"></span>
      <span class="material-icons" *ngIf="!isLoading">delete</span>
      {{ isLoading ? 'Excluindo...' : 'Excluir' }}
    </button>
  </div>

</div>
