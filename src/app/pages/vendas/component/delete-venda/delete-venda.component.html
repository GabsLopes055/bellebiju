<h2 mat-dialog-title class="dialog-title">
  <mat-icon>warning</mat-icon>
  Excluir Venda
</h2>

<mat-divider></mat-divider>

<mat-dialog-content class="dialog-content">
  <p class="confirm-text">
    Tem certeza que deseja excluir a venda de <strong>{{ venda.nomeProduto }}</strong>?
  </p>
  <p class="confirm-sub">Esta ação não pode ser desfeita.</p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancelar</button>
  <button mat-raised-button class="btn-deletar" (click)="confirmarExclusao()" [disabled]="isLoading">
    <mat-spinner *ngIf="isLoading" diameter="18"></mat-spinner>
    <mat-icon *ngIf="!isLoading">delete</mat-icon>
    Excluir
  </button>
</mat-dialog-actions>
