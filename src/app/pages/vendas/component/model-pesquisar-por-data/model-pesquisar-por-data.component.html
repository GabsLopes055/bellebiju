<div class="dialog-wrap">

  <!-- Header -->
  <div class="dialog-header">
    <div class="dialog-title-row">
      <div class="dialog-icon-wrap purple">
        <span class="material-icons">date_range</span>
      </div>
      <div>
        <h2 class="dialog-title">Pesquisar por Período</h2>
        <p class="dialog-sub">Selecione o intervalo de datas</p>
      </div>
    </div>
    <button class="dialog-close" (click)="fecharModal()" title="Fechar">
      <span class="material-icons">close</span>
    </button>
  </div>

  <!-- Body -->
  <div class="dialog-body">

    <!-- Chips de período rápido -->
    <div class="chips-label">Período rápido</div>
    <div class="chips-row">
      <button
        type="button"
        class="period-chip"
        *ngFor="let chip of chips"
        [class.active]="activeChip === chip.id"
        (click)="aplicarChip(chip)">
        <span class="material-icons">{{ chip.icon }}</span>
        {{ chip.label }}
      </button>
    </div>

    <div class="chips-divider"></div>

    <form [formGroup]="formData">

      <div class="field-group">
        <label class="field-label">Data Inicial</label>
        <div class="field-wrap">
          <span class="material-icons field-icon">today</span>
          <input class="field-input has-icon" type="date"
            formControlName="dataInicio"
            (change)="onDateChange()">
        </div>
      </div>

      <div class="field-group">
        <label class="field-label">Data Final</label>
        <div class="field-wrap">
          <span class="material-icons field-icon">event</span>
          <input class="field-input has-icon" type="date"
            formControlName="dataFim"
            (change)="onDateChange()">
        </div>
        <span class="field-error"
          *ngIf="formData.value.dataFim && formData.value.dataInicio && formData.value.dataFim < formData.value.dataInicio">
          Data final não pode ser anterior à inicial
        </span>
      </div>

    </form>
  </div>

  <!-- Footer -->
  <div class="dialog-footer">
    <button class="btn-ghost" (click)="fecharModal()">Cancelar</button>
    <button class="btn-primary" (click)="pesquisarVendas()" [disabled]="formData.invalid">
      <span class="material-icons">search</span>
      Pesquisar
    </button>
  </div>

</div>
