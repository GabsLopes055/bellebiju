<div class="dialog-wrap">

  <!-- Header -->
  <div class="dialog-header">
    <div class="dialog-title-row">
      <div class="dialog-icon-wrap teal">
        <span class="material-icons">edit</span>
      </div>
      <div>
        <h2 class="dialog-title">Editar Venda</h2>
        <p class="dialog-sub">Atualize os dados da venda</p>
      </div>
    </div>
    <button class="dialog-close" mat-dialog-close title="Fechar">
      <span class="material-icons">close</span>
    </button>
  </div>

  <!-- Body -->
  <div class="dialog-body">
    <form [formGroup]="formGroup">

      <div class="field-group">
        <label class="field-label">Nome do Produto</label>
        <div class="field-wrap">
          <span class="material-icons field-icon">diamond</span>
          <input class="field-input has-icon" type="text" formControlName="nomeProduto">
        </div>
        <span class="field-error" *ngIf="formGroup.controls['nomeProduto'].touched && formGroup.controls['nomeProduto'].hasError('required')">
          Campo obrigatório
        </span>
        <span class="field-error" *ngIf="formGroup.controls['nomeProduto'].touched && formGroup.controls['nomeProduto'].hasError('minlength')">
          Mínimo 3 caracteres
        </span>
      </div>

      <div class="row-2">
        <div class="field-group">
          <label class="field-label">Preço (R$)</label>
          <div class="field-wrap">
            <span class="material-icons field-icon">attach_money</span>
            <input class="field-input has-icon" type="number"
              formControlName="preco" min="0.01" step="0.01">
          </div>
          <span class="field-error" *ngIf="formGroup.controls['preco'].touched && formGroup.controls['preco'].invalid">
            Preço inválido
          </span>
        </div>

        <div class="field-group">
          <label class="field-label">Quantidade</label>
          <div class="field-wrap">
            <span class="material-icons field-icon">tag</span>
            <input class="field-input has-icon" type="number"
              formControlName="quantidade" min="1">
          </div>
          <span class="field-error" *ngIf="formGroup.controls['quantidade'].touched && formGroup.controls['quantidade'].invalid">
            Quantidade inválida
          </span>
        </div>
      </div>

      <div class="field-group">
        <label class="field-label">Total da Venda</label>
        <div class="field-wrap">
          <span class="material-icons field-icon">calculate</span>
          <input class="field-input has-icon total-field" type="text" readonly
            [value]="formGroup.controls['total'].value != null
              ? (formGroup.controls['total'].value | currency:'BRL')
              : '—'">
        </div>
        <span class="field-hint">Calculado automaticamente</span>
      </div>

      <div class="field-group">
        <label class="field-label">Forma de Pagamento</label>
        <div class="field-wrap">
          <span class="material-icons field-icon">payments</span>
          <select class="field-input has-icon" formControlName="formaPagamento">
            <option value="DINHEIRO">Dinheiro</option>
            <option value="PIX">PIX</option>
            <option value="DEBITO">Cartão de Débito</option>
            <option value="CREDITO">Cartão de Crédito</option>
          </select>
        </div>
        <span class="field-error" *ngIf="formGroup.controls['formaPagamento'].touched && formGroup.controls['formaPagamento'].invalid">
          Selecione a forma de pagamento
        </span>
      </div>

    </form>
  </div>

  <!-- Footer -->
  <div class="dialog-footer">
    <button class="btn-ghost" mat-dialog-close>Cancelar</button>
    <button class="btn-primary" (click)="salvarEdicao()"
      [disabled]="formGroup.invalid || isLoading">
      <span class="btn-spinner" *ngIf="isLoading"></span>
      <span class="material-icons" *ngIf="!isLoading">save</span>
      {{ isLoading ? 'Salvando...' : 'Salvar' }}
    </button>
  </div>

</div>
