<div class="container">
  <h2 class="dialog-title">
    <mat-icon>date_range</mat-icon>
    Selecionar Período
  </h2>

  <mat-divider></mat-divider>

  <form [formGroup]="formData" class="form">
    <mat-form-field appearance="outline" class="date-field">
      <mat-label>Período de análise</mat-label>
      <mat-date-range-input [rangePicker]="picker">
        <input matStartDate placeholder="Data inicial" readonly formControlName="dataInicio">
        <input matEndDate placeholder="Data final" readonly formControlName="dataFim">
      </mat-date-range-input>
      <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
      <mat-date-range-picker #picker></mat-date-range-picker>
    </mat-form-field>
  </form>

  <div class="actions">
    <button mat-raised-button class="btn-pesquisar" (click)="pesquisarVendas()" [disabled]="formData.invalid">
      <mat-icon>search</mat-icon>
      Pesquisar
    </button>
    <button mat-button (click)="fecharModal()">Cancelar</button>
  </div>
</div>
