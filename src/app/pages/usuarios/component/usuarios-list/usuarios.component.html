<div class="container">
  <div class="content">

    <mat-card class="card-superior mat-elevation-z8">
      <mat-card-header>
        <mat-card-title>Usuários</mat-card-title>
        <mat-card-subtitle>{{ users.length }} usuário(s) cadastrado(s)</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content class="card-actions">
        <mat-form-field appearance="outline" class="search-field">
          <mat-label>Pesquisar</mat-label>
          <input matInput [(ngModel)]="searchTerm" placeholder="Nome ou usuário...">
          <mat-icon matSuffix>search</mat-icon>
        </mat-form-field>
        <button class="button-cadastrar" mat-raised-button (click)="createNewUser()">
          <mat-icon>person_add</mat-icon>
          Cadastrar Usuário
        </button>
      </mat-card-content>
    </mat-card>

    <div class="progress">
      <mat-divider></mat-divider>
      <mat-progress-bar *ngIf="isLoading" mode="indeterminate"></mat-progress-bar>
    </div>

    <mat-card class="card-table-users mat-elevation-z8">
      <div class="tableUsers">
        <table mat-table [dataSource]="filteredUsers">

          <ng-container matColumnDef="nome">
            <th mat-header-cell *matHeaderCellDef>Nome</th>
            <td mat-cell *matCellDef="let element">
              <div class="user-name-cell">
                <mat-icon class="user-icon">person</mat-icon>
                <span>{{ element.nome }}</span>
              </div>
            </td>
          </ng-container>

          <ng-container matColumnDef="username">
            <th mat-header-cell *matHeaderCellDef>Usuário</th>
            <td mat-cell *matCellDef="let element">{{ element.username }}</td>
          </ng-container>

          <ng-container matColumnDef="createdAt">
            <th mat-header-cell *matHeaderCellDef>Criado em</th>
            <td mat-cell *matCellDef="let element">{{ element.createdAt | date: 'dd/MM/yyyy' }}</td>
          </ng-container>

          <ng-container matColumnDef="roles">
            <th mat-header-cell *matHeaderCellDef>Permissão</th>
            <td mat-cell *matCellDef="let element">
              <span class="role-badge" [ngClass]="element.roles === 'ADMIN' ? 'role-admin' : 'role-user'">
                {{ element.roles }}
              </span>
            </td>
          </ng-container>

          <ng-container matColumnDef="editar">
            <th mat-header-cell *matHeaderCellDef>Editar</th>
            <td mat-cell *matCellDef="let element">
              <button mat-icon-button color="accent" (click)="editarUsuario(element)" matTooltip="Editar usuário">
                <mat-icon>edit</mat-icon>
              </button>
            </td>
          </ng-container>

          <ng-container matColumnDef="deletar">
            <th mat-header-cell *matHeaderCellDef>Deletar</th>
            <td mat-cell *matCellDef="let element">
              <button mat-icon-button color="warn" (click)="deleteUsuario(element)" matTooltip="Excluir usuário">
                <mat-icon>delete</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="headersTable"></tr>
          <tr mat-row *matRowDef="let row; columns: headersTable;"></tr>

          <tr class="mat-row" *matNoDataRow>
            <td class="mat-cell no-data-cell" colspan="6">
              <mat-icon>search_off</mat-icon>
              <span>Nenhum usuário encontrado</span>
            </td>
          </tr>

        </table>
      </div>
    </mat-card>

  </div>
</div>
