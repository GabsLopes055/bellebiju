<div class="dialog-wrap">

  <!-- Header -->
  <div class="dialog-header">
    <div class="dialog-title-row">
      <div class="dialog-icon-wrap teal">
        <span class="material-icons">person_add</span>
      </div>
      <div>
        <h2 class="dialog-title">Novo Usuário</h2>
        <p class="dialog-sub">Preencha os dados do novo usuário</p>
      </div>
    </div>
    <button class="dialog-close" mat-dialog-close title="Fechar">
      <span class="material-icons">close</span>
    </button>
  </div>

  <!-- Body -->
  <div class="dialog-body">
    <form [formGroup]="formGroup">

      <div class="field-group">
        <label class="field-label">Nome completo</label>
        <div class="field-wrap">
          <span class="material-icons field-icon">badge</span>
          <input class="field-input has-icon" type="text"
            formControlName="nome" placeholder="Nome do usuário">
        </div>
        <span class="field-error" *ngIf="formGroup.controls['nome'].touched && formGroup.controls['nome'].invalid">
          {{ getErrorMessage('nome') }}
        </span>
      </div>

      <div class="field-group">
        <label class="field-label">Nome de usuário</label>
        <div class="field-wrap">
          <span class="material-icons field-icon">alternate_email</span>
          <input class="field-input has-icon" type="text"
            formControlName="username" placeholder="username">
        </div>
        <span class="field-error" *ngIf="formGroup.controls['username'].touched && formGroup.controls['username'].invalid">
          {{ getErrorMessage('username') }}
        </span>
      </div>

      <div class="field-group">
        <label class="field-label">Senha</label>
        <div class="field-wrap">
          <span class="material-icons field-icon">lock</span>
          <input class="field-input has-icon has-suffix"
            [type]="hide ? 'password' : 'text'"
            formControlName="password" placeholder="••••••">
          <button type="button" class="field-suffix-btn" (click)="hide = !hide" [title]="hide ? 'Mostrar senha' : 'Ocultar senha'">
            <span class="material-icons">{{ hide ? 'visibility' : 'visibility_off' }}</span>
          </button>
        </div>
        <span class="field-error" *ngIf="formGroup.controls['password'].touched && formGroup.controls['password'].invalid">
          {{ getErrorMessage('password') }}
        </span>
      </div>

      <div class="field-group">
        <label class="field-label">Permissão</label>
        <div class="field-wrap">
          <span class="material-icons field-icon">shield</span>
          <select class="field-input has-icon" formControlName="roles">
            <option value="" disabled>Selecione...</option>
            <option *ngFor="let role of allRoles" [value]="role">{{ role }}</option>
          </select>
        </div>
        <span class="field-error" *ngIf="formGroup.controls['roles'].touched && formGroup.controls['roles'].invalid">
          {{ getErrorMessage('roles') }}
        </span>
      </div>

    </form>
  </div>

  <!-- Footer -->
  <div class="dialog-footer">
    <button class="btn-ghost" mat-dialog-close [disabled]="isLoading">Cancelar</button>
    <button class="btn-primary" (click)="saveUser()"
      [disabled]="formGroup.invalid || isLoading">
      <span class="btn-spinner" *ngIf="isLoading"></span>
      <span class="material-icons" *ngIf="!isLoading">person_add</span>
      {{ isLoading ? 'Cadastrando...' : 'Cadastrar' }}
    </button>
  </div>

</div>
