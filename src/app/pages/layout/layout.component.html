<mat-sidenav-container autosize>

  <mat-sidenav #sidenav
    [class.collapsed]="isCollapsed"
    [opened]="sidenavOpened"
    [mode]="isMobile ? 'over' : 'side'"
    [disableClose]="!isMobile">

    <div class="sidenav-wrapper">

      <!-- Header: logo + botão de colapso -->
      <div class="sidenav-header" [class.collapsed]="isCollapsed">
        <div class="brand-block">
          <div class="logo-wrapper">
            <img src="../../../assets/img/logo.jpeg" alt="Belle Biju">
          </div>
          <div class="brand-text">
            <span class="brand-name">Belle Biju</span>
            <span class="brand-subtitle">Gestão de Bijuterias</span>
          </div>
        </div>

        <button mat-icon-button class="collapse-btn"
          *ngIf="!isMobile"
          (click)="toggleCollapse()"
          [matTooltip]="isCollapsed ? 'Expandir' : 'Recolher'"
          matTooltipPosition="right">
          <mat-icon>{{ isCollapsed ? 'chevron_right' : 'chevron_left' }}</mat-icon>
        </button>
      </div>

      <mat-divider class="brand-divider"></mat-divider>

      <!-- Label da seção -->
      <span class="nav-section-label" [class.hidden]="isCollapsed">MENU</span>

      <!-- Itens de navegação -->
      <nav class="sidenav-nav">

        <a class="nav-item" routerLink="/dashboard" routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          [matTooltip]="isCollapsed ? 'Dashboard' : ''"
          matTooltipPosition="right">
          <mat-icon>dashboard</mat-icon>
          <span class="nav-label">Dashboard</span>
        </a>

        <a class="nav-item" routerLink="adicionarVenda/visualizarVenda" routerLinkActive="active"
          [matTooltip]="isCollapsed ? 'Vendas' : ''"
          matTooltipPosition="right">
          <mat-icon>point_of_sale</mat-icon>
          <span class="nav-label">Vendas</span>
        </a>

        <a class="nav-item" routerLink="graficos" routerLinkActive="active"
          [matTooltip]="isCollapsed ? 'Gráficos' : ''"
          matTooltipPosition="right">
          <mat-icon>bar_chart</mat-icon>
          <span class="nav-label">Gráficos</span>
        </a>

        <a class="nav-item" routerLink="produtos" routerLinkActive="active"
          [matTooltip]="isCollapsed ? 'Produtos' : ''"
          matTooltipPosition="right">
          <mat-icon>inventory_2</mat-icon>
          <span class="nav-label">Produtos</span>
        </a>

        <a class="nav-item" routerLink="usuarios" routerLinkActive="active"
          [matTooltip]="isCollapsed ? 'Usuários' : ''"
          matTooltipPosition="right">
          <mat-icon>group</mat-icon>
          <span class="nav-label">Usuários</span>
        </a>

      </nav>

      <!-- Footer: avatar do usuário + logout -->
      <div class="sidenav-footer">
        <mat-divider class="brand-divider"></mat-divider>

        <div class="user-card" [class.collapsed]="isCollapsed"
          [matTooltip]="isCollapsed ? userName : ''"
          matTooltipPosition="right">
          <div class="user-avatar">{{ userInitials }}</div>
          <div class="user-details">
            <span class="user-display-name">{{ userName }}</span>
            <span class="user-role">Usuário</span>
          </div>
        </div>

        <button class="nav-item logout-btn" (click)="logout()"
          [matTooltip]="isCollapsed ? 'Sair' : ''"
          matTooltipPosition="right">
          <mat-icon>logout</mat-icon>
          <span class="nav-label">Sair</span>
        </button>
      </div>

    </div>
  </mat-sidenav>

  <mat-sidenav-content>

    <!-- Toolbar superior -->
    <mat-toolbar class="top-toolbar">
      <button mat-icon-button class="menu-toggle"
        (click)="isMobile ? toggleSidenav() : toggleCollapse()"
        aria-label="Toggle menu">
        <mat-icon>{{ isMobile ? 'menu' : (isCollapsed ? 'menu_open' : 'menu') }}</mat-icon>
      </button>

      <span class="page-title">{{ pageTitle }}</span>
      <span class="toolbar-spacer"></span>

      <div class="toolbar-user" *ngIf="userName">
        <div class="toolbar-avatar">{{ userInitials }}</div>
        <span class="toolbar-username">{{ userName }}</span>
      </div>
    </mat-toolbar>

    <!-- Conteúdo principal -->
    <div class="main-content">
      <router-outlet></router-outlet>
    </div>

  </mat-sidenav-content>

</mat-sidenav-container>
