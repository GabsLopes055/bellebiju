<div class="dialog-wrap">

  <div class="dialog-header">
    <div class="dialog-icon-wrap teal">
      <span class="material-icons">inventory_2</span>
    </div>
    <div>
      <h2 class="dialog-title">Novo Produto</h2>
      <p class="dialog-subtitle">Preencha os dados do produto</p>
    </div>
    <button class="dialog-close-btn" mat-dialog-close>
      <span class="material-icons">close</span>
    </button>
  </div>

  <form [formGroup]="formGroup" (ngSubmit)="save()" class="dialog-body">

    <!-- Nome -->
    <div class="field-group">
      <label class="field-label">Nome do Produto <span class="required">*</span></label>
      <div class="field-input-wrap">
        <span class="field-icon material-icons">label</span>
        <input class="field-input has-icon" type="text"
          placeholder="Ex: Anel de Prata"
          formControlName="nomeProduto"
          autocomplete="off" />
      </div>
      <span class="field-error" *ngIf="formGroup.get('nomeProduto')?.touched && getError('nomeProduto')">
        {{ getError('nomeProduto') }}
      </span>
    </div>

    <!-- Preço -->
    <div class="field-group">
      <label class="field-label">Preço <span class="required">*</span></label>
      <div class="field-input-wrap">
        <span class="field-icon material-icons">attach_money</span>
        <input class="field-input has-icon" type="number" step="0.01" min="0.01"
          placeholder="0,00"
          formControlName="precoProduto" />
      </div>
      <span class="field-error" *ngIf="formGroup.get('precoProduto')?.touched && getError('precoProduto')">
        {{ getError('precoProduto') }}
      </span>
    </div>

    <!-- Estoque + Mínimo -->
    <div class="field-row">
      <div class="field-group">
        <label class="field-label">Qtd. em Estoque</label>
        <div class="field-input-wrap">
          <span class="field-icon material-icons">warehouse</span>
          <input class="field-input has-icon" type="number" min="0"
            formControlName="quantidadeEstoque" />
        </div>
      </div>
      <div class="field-group">
        <label class="field-label">Estoque Mínimo</label>
        <div class="field-input-wrap">
          <span class="field-icon material-icons">warning</span>
          <input class="field-input has-icon" type="number" min="0"
            formControlName="estoqueMinimo" />
        </div>
      </div>
    </div>

    <!-- Categoria -->
    <div class="field-group">
      <label class="field-label">Categoria</label>
      <div class="field-input-wrap">
        <span class="field-icon material-icons">category</span>
        <select class="field-input has-icon" formControlName="idCategoria">
          <option [ngValue]="null">Sem categoria</option>
          <option *ngFor="let cat of categorias" [value]="cat.idCategoria">
            {{ cat.nomeCategoria }}
          </option>
        </select>
      </div>
    </div>

    <div class="dialog-footer">
      <button type="button" class="btn-ghost" mat-dialog-close>Cancelar</button>
      <button type="submit" class="btn-primary" [disabled]="formGroup.invalid || isLoading">
        <span class="btn-spinner" *ngIf="isLoading"></span>
        <span class="material-icons" *ngIf="!isLoading">add_circle</span>
        {{ isLoading ? 'Salvando...' : 'Criar Produto' }}
      </button>
    </div>

  </form>
</div>
